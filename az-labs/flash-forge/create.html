<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashForge | Create a Deck</title>
    <link rel="icon" type="image/png" href="../../favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #100616; color: white; }
        .glass-panel { background: rgba(255,255,255,0.03); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .text-gradient { background: linear-gradient(135deg, #ec4899, #f97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .nav-link { position: relative; transition: color 0.2s; }
        .nav-link::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 0; height: 2px; background: #ec4899; transition: width 0.3s; }
        .nav-link:hover::after { width: 100%; }
        input, textarea, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 0.75rem; padding: 0.75rem 1rem; color: white; width: 100%; transition: border-color 0.2s; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #ec4899; }
        textarea { resize: none; }
        select option { background: #1a0525; }
        .card-row { background: rgba(236,72,153,0.05); border: 1px solid rgba(236,72,153,0.15); border-radius: 1rem; padding: 1rem; display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: center; }
        .card-row input { margin: 0; }
        .del-btn { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #fca5a5; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
        .del-btn:hover { background: rgba(239,68,68,0.3); }
        .toast { position: fixed; top: 80px; right: 24px; z-index: 999; padding: 12px 20px; border-radius: 12px; font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); transform: translateX(200%); transition: transform 0.3s ease; }
        .toast.show { transform: translateX(0); }
        .deck-chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 999px; background: rgba(236,72,153,0.1); border: 1px solid rgba(236,72,153,0.25); font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .deck-chip:hover { background: rgba(236,72,153,0.2); }
    </style>
</head>
<body class="min-h-screen">
    <div id="toast" class="toast bg-emerald-600 text-white"><span class="material-symbols-outlined">check_circle</span><span id="toastMsg">Saved!</span></div>

    <!-- Header -->
    <header class="glass-panel border-b border-white/5 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="index.html" class="text-xl font-black tracking-tight flex items-center gap-2">
                <span class="text-2xl">⚡</span>
                <span class="text-white">Flash<span class="text-gradient">Forge</span></span>
            </a>
            <nav class="hidden md:flex items-center gap-6 text-sm font-semibold text-gray-400">
                <a href="index.html" class="nav-link hover:text-white">Home</a>
                <a href="create.html" class="nav-link hover:text-white text-pink-300">Create Deck</a>
                <a href="study.html" class="nav-link hover:text-white">Study</a>
            </nav>
            <a href="../index.html" class="px-4 py-2 bg-white/5 border border-white/10 text-gray-300 rounded-full font-bold text-sm transition hover:bg-white/10 flex items-center gap-2">
                <span class="material-symbols-outlined text-[18px]">science</span> AZ Labs
            </a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-12">
        <div class="mb-8">
            <h1 class="text-4xl font-black mb-2">Create a Deck ⚡</h1>
            <p class="text-gray-400">Build a flashcard deck for any subject. Add cards, save, and start studying.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

            <!-- Left: Deck Info -->
            <div class="lg:col-span-1 space-y-4">
                <div class="glass-panel rounded-2xl p-5 space-y-4">
                    <h3 class="font-bold text-gray-300 uppercase tracking-wide text-sm">Deck Info</h3>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">Deck Name</label>
                        <input type="text" id="deckName" placeholder="e.g. UGRC 110 Chapter 2" maxlength="50">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">Subject</label>
                        <select id="deckSubject">
                            <option value="">Pick a subject</option>
                            <option>Biology</option>
                            <option>Chemistry</option>
                            <option>Physics</option>
                            <option>Mathematics</option>
                            <option>Economics</option>
                            <option>Law</option>
                            <option>Computer Science</option>
                            <option>Geography</option>
                            <option>History</option>
                            <option>English</option>
                            <option>Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1">Description</label>
                        <textarea id="deckDesc" rows="2" placeholder="Brief description..." maxlength="100"></textarea>
                    </div>
                </div>

                <!-- Saved Decks -->
                <div class="glass-panel rounded-2xl p-5">
                    <h3 class="font-bold text-gray-300 uppercase tracking-wide text-sm mb-4">Your Decks</h3>
                    <div id="deckList" class="space-y-2">
                        <p class="text-xs text-gray-500 text-center py-2">No decks yet.</p>
                    </div>
                </div>
            </div>

            <!-- Right: Cards -->
            <div class="lg:col-span-2">
                <div class="glass-panel rounded-2xl p-5 mb-4">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="font-bold text-gray-300 uppercase tracking-wide text-sm">Cards (<span id="cardCount">0</span>)</h3>
                        <button onclick="addCardRow()" class="px-4 py-2 bg-pink-600/20 border border-pink-500/40 text-pink-300 rounded-full font-bold text-xs hover:bg-pink-500/30 transition flex items-center gap-1">
                            <span class="material-symbols-outlined text-sm">add</span> Add Card
                        </button>
                    </div>

                    <!-- Column headers -->
                    <div class="grid grid-cols-2 gap-2 px-1 mb-2 text-xs font-bold text-gray-500 uppercase tracking-wide">
                        <span class="pl-2">Front (Question)</span>
                        <span class="pl-2">Back (Answer)</span>
                    </div>

                    <div id="cardRows" class="space-y-2 max-h-[400px] overflow-y-auto pr-1">
                    </div>
                </div>

                <div class="flex gap-3">
                    <button onclick="saveDeck()" class="flex-1 py-3 bg-gradient-to-r from-pink-600 to-orange-600 rounded-xl font-bold text-base hover:opacity-90 transition flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined">save</span> Save Deck
                    </button>
                    <a href="study.html" class="flex-1 py-3 glass-panel border border-pink-500/30 text-pink-300 rounded-xl font-bold text-base hover:bg-pink-500/10 transition flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined">school</span> Study
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/5 bg-black/20 pt-8 pb-6 text-center mt-8">
        <div class="text-xl font-black mb-1">⚡ FlashForge</div>
        <div class="flex justify-center gap-6 text-sm text-gray-500">
            <a href="index.html" class="hover:text-white transition">Home</a>
            <a href="create.html" class="hover:text-white transition">Create</a>
            <a href="study.html" class="hover:text-white transition">Study</a>
        </div>
    </footer>

    <script>
        let cardCount = 0;

        function addCardRow(front='', back='') {
            cardCount++;
            document.getElementById('cardCount').textContent = document.querySelectorAll('.card-row').length + 1;
            const row = document.createElement('div');
            row.className = 'card-row';
            row.innerHTML = `
                <input type="text" class="card-front-input" placeholder="Question..." value="${front}">
                <input type="text" class="card-back-input" placeholder="Answer..." value="${back}">
                <button class="del-btn" onclick="this.closest('.card-row').remove();updateCount()">
                    <span class="material-symbols-outlined text-sm">close</span>
                </button>`;
            document.getElementById('cardRows').appendChild(row);
            updateCount();
        }

        function updateCount() {
            document.getElementById('cardCount').textContent = document.querySelectorAll('.card-row').length;
        }

        function saveDeck() {
            const name = document.getElementById('deckName').value.trim();
            if (!name) { showToast('Give your deck a name!', 'error'); return; }
            const rows = document.querySelectorAll('.card-row');
            const cards = [];
            rows.forEach(row => {
                const f = row.querySelector('.card-front-input').value.trim();
                const b = row.querySelector('.card-back-input').value.trim();
                if (f && b) cards.push({ front: f, back: b });
            });
            if (!cards.length) { showToast('Add at least one card!', 'error'); return; }
            const decks = JSON.parse(localStorage.getItem('flashforge_decks') || '[]');
            const deck = {
                id: Date.now(),
                name,
                subject: document.getElementById('deckSubject').value,
                desc: document.getElementById('deckDesc').value,
                cards,
                created: new Date().toISOString()
            };
            decks.unshift(deck);
            localStorage.setItem('flashforge_decks', JSON.stringify(decks.slice(0,50)));
            showToast(`Deck saved! ${cards.length} cards ready. ⚡`);
            renderDecks();
        }

        function renderDecks() {
            const decks = JSON.parse(localStorage.getItem('flashforge_decks') || '[]');
            const list = document.getElementById('deckList');
            if (!decks.length) {
                list.innerHTML = '<p class="text-xs text-gray-500 text-center py-2">No decks yet.</p>';
                return;
            }
            list.innerHTML = decks.map(d => `
                <a href="study.html?deck=${d.id}" class="deck-chip w-full justify-between">
                    <span class="truncate">${d.name}</span>
                    <span class="text-gray-400 flex-shrink-0">${d.cards.length} cards</span>
                </a>`).join('');
        }

        function showToast(msg, type='success') {
            const toast = document.getElementById('toast');
            toast.style.background = type === 'error' ? '#ef4444' : '#10b981';
            document.getElementById('toastMsg').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Starter cards
        addCardRow('What is photosynthesis?', 'The process by which plants use sunlight to make food.');
        addCardRow('Define osmosis', 'Movement of water from high to low concentration across a membrane.');
        renderDecks();
    </script>
</body>
</html>
