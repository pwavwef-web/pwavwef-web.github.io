<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZ Labs | Study History</title>
    <link rel="icon" type="image/png" href="../../favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: white; min-height: 100vh; overflow-x: hidden; }
        .bg-animated { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(-45deg, #001a1a, #0f172a, #001020, #0f172a); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        @keyframes gradientBG { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        .glass-panel { background: rgba(255,255,255,0.03); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .nav-link { position: relative; transition: color 0.2s; }
        .nav-link::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 0; height: 2px; background: #22d3ee; transition: width 0.3s; }
        .nav-link:hover::after { width: 100%; }
        .heatmap-cell { width: 14px; height: 14px; border-radius: 3px; transition: all 0.2s; }
        .heatmap-cell:hover { transform: scale(1.3); }
    </style>
</head>
<body>
    <div class="bg-animated"></div>

    <!-- Header -->
    <header class="glass-panel border-b border-white/5 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="../index.html" class="text-sm font-bold text-gray-500 hover:text-gray-300 transition flex items-center gap-1">
                    <span class="material-symbols-outlined text-[16px]">arrow_back</span> AZ Labs
                </a>
                <span class="text-gray-700">/</span>
                <span class="text-lg font-black text-white flex items-center gap-2">⏱️ Study Timer</span>
            </div>
            <nav class="hidden md:flex items-center gap-6 text-sm font-semibold text-gray-400">
                <a href="index.html" class="nav-link hover:text-white transition">Timer</a>
                <a href="history.html" class="text-cyan-300 transition">History</a>
            </nav>
            <button onclick="document.getElementById('mobileMenu').classList.toggle('hidden')" class="md:hidden p-2 rounded-lg hover:bg-white/10 transition">
                <span class="material-symbols-outlined">menu</span>
            </button>
        </div>
        <div id="mobileMenu" class="hidden md:hidden border-t border-white/5 px-6 py-4 flex gap-6 text-sm font-semibold text-gray-400">
            <a href="index.html" class="hover:text-white transition">Timer</a>
            <a href="history.html" class="text-cyan-300">History</a>
        </div>
    </header>

    <!-- Main -->
    <main class="max-w-4xl mx-auto px-6 pt-12 pb-32 space-y-10">

        <div class="space-y-2">
            <h1 class="text-4xl font-black">Study History 📈</h1>
            <p class="text-gray-400">Every session logged. Your grind, visualized.</p>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="statsRow">
            <!-- Filled by JS -->
        </div>

        <!-- Activity heatmap (last 28 days) -->
        <div class="glass-panel rounded-3xl p-8 space-y-5">
            <h2 class="font-black text-lg">28-Day Activity</h2>
            <div id="heatmapGrid" class="flex gap-1 flex-wrap"></div>
            <div class="flex items-center gap-2 text-xs text-gray-500">
                <span>Less</span>
                <div class="w-3 h-3 rounded-sm bg-white/5"></div>
                <div class="w-3 h-3 rounded-sm bg-cyan-900/50"></div>
                <div class="w-3 h-3 rounded-sm bg-cyan-700/60"></div>
                <div class="w-3 h-3 rounded-sm bg-cyan-500/70"></div>
                <div class="w-3 h-3 rounded-sm bg-cyan-400"></div>
                <span>More</span>
            </div>
        </div>

        <!-- Best tasks -->
        <div class="glass-panel rounded-3xl p-8 space-y-5">
            <h2 class="font-black text-lg">Most Studied Topics</h2>
            <div id="topTasks" class="space-y-3">
                <div class="text-gray-500 text-sm text-center py-4">No sessions yet. Start your first session!</div>
            </div>
        </div>

        <!-- Session log -->
        <div class="space-y-4">
            <div class="flex items-center justify-between">
                <h2 class="font-black text-lg">Session Log</h2>
                <button onclick="clearAll()" class="text-xs text-red-400 hover:text-red-300 font-bold transition flex items-center gap-1">
                    <span class="material-symbols-outlined text-[14px]">delete</span> Clear All
                </button>
            </div>
            <div id="sessionLog" class="space-y-3"></div>
        </div>

        <a href="index.html"
            class="flex items-center justify-center gap-2 w-full py-4 bg-gradient-to-r from-cyan-600 to-blue-600 rounded-2xl font-black text-lg hover:shadow-[0_0_30px_rgba(34,211,238,0.4)] transition">
            <span class="material-symbols-outlined">play_arrow</span>
            Start a New Session
        </a>

    </main>

    <script>
        const STORAGE_KEY = 'azlabs_sessions';

        function getSessions() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
        }

        function clearAll() {
            if (!confirm('Delete all session history? This cannot be undone.')) return;
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }

        function formatDuration(secs) {
            const m = Math.floor(secs / 60);
            const s = secs % 60;
            if (s === 0) return `${m}m`;
            return `${m}m ${s}s`;
        }

        function render() {
            const sessions = getSessions();
            const completed = sessions.filter(s => !s.skipped);
            const today = new Date().toISOString().split('T')[0];
            const todaySessions = completed.filter(s => s.date === today);
            const totalMins = Math.round(completed.reduce((sum, s) => sum + s.duration, 0) / 60);
            const todayMins = Math.round(todaySessions.reduce((sum, s) => sum + s.duration, 0) / 60);

            // Streak
            const uniqueDays = [...new Set(completed.map(s => s.date))].sort().reverse();
            let streak = 0, check = today;
            for (const day of uniqueDays) {
                if (day === check) { streak++; const d = new Date(check); d.setDate(d.getDate()-1); check = d.toISOString().split('T')[0]; }
                else if (day < check) break;
            }

            // Stats
            const statsRow = document.getElementById('statsRow');
            if (!sessions.length) {
                statsRow.innerHTML = '<div class="col-span-4 glass-panel rounded-2xl p-6 text-center text-gray-500 text-sm">No sessions yet. <a href="index.html" class="text-cyan-400 underline">Start your first session!</a></div>';
            } else {
                const stats = [
                    { label: 'Total Sessions', value: completed.length, icon: 'check_circle', color: 'text-cyan-400' },
                    { label: 'Total Minutes', value: totalMins, icon: 'schedule', color: 'text-blue-400' },
                    { label: 'Today', value: todayMins + 'm', icon: 'today', color: 'text-green-400' },
                    { label: 'Day Streak', value: streak + ' 🔥', icon: 'local_fire_department', color: 'text-orange-400' },
                ];
                statsRow.innerHTML = stats.map(s => `
                    <div class="glass-panel rounded-2xl p-5 flex flex-col gap-1">
                        <span class="material-symbols-outlined ${s.color} text-[22px]">${s.icon}</span>
                        <div class="text-2xl font-black">${s.value}</div>
                        <div class="text-xs text-gray-500">${s.label}</div>
                    </div>`).join('');
            }

            // Heatmap (28 days)
            const dateMap = {};
            completed.forEach(s => { dateMap[s.date] = (dateMap[s.date] || 0) + 1; });
            const maxSessions = Math.max(...Object.values(dateMap), 1);
            const heatmap = document.getElementById('heatmapGrid');
            const cells = [];
            for (let i = 27; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const dateStr = d.toISOString().split('T')[0];
                const count = dateMap[dateStr] || 0;
                const intensity = count === 0 ? 0 : Math.ceil((count / maxSessions) * 4);
                const bgColors = ['bg-white/5', 'bg-cyan-900/50', 'bg-cyan-700/60', 'bg-cyan-500/70', 'bg-cyan-400'];
                const label = d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
                cells.push(`<div class="heatmap-cell ${bgColors[intensity]}" title="${label}: ${count} session${count !== 1 ? 's' : ''}"></div>`);
            }
            heatmap.innerHTML = cells.join('');

            // Top tasks
            const taskMap = {};
            completed.forEach(s => { const key = s.task || 'Focus Session'; taskMap[key] = (taskMap[key] || 0) + s.duration; });
            const sortedTasks = Object.entries(taskMap).sort((a,b) => b[1]-a[1]).slice(0, 5);
            const topTasks = document.getElementById('topTasks');
            if (!sortedTasks.length) {
                topTasks.innerHTML = '<div class="text-gray-500 text-sm text-center py-4">No sessions yet. Start your first session!</div>';
            } else {
                const maxTime = sortedTasks[0][1];
                topTasks.innerHTML = sortedTasks.map(([task, secs]) => {
                    const pct = Math.round((secs / maxTime) * 100);
                    return `<div class="flex items-center gap-3">
                        <span class="text-sm text-gray-300 w-40 truncate font-medium">${task}</span>
                        <div class="flex-1 bg-white/5 rounded-full h-2 overflow-hidden">
                            <div class="h-full rounded-full bg-gradient-to-r from-cyan-500 to-blue-500" style="width:${pct}%"></div>
                        </div>
                        <span class="text-xs text-gray-500 w-14 text-right">${formatDuration(secs)}</span>
                    </div>`;
                }).join('');
            }

            // Session log grouped by date
            const logDiv = document.getElementById('sessionLog');
            if (!sessions.length) {
                logDiv.innerHTML = '<div class="glass-panel rounded-2xl p-4 text-center text-gray-500 text-sm">No sessions yet.</div>';
                return;
            }
            const grouped = {};
            sessions.forEach(s => { if (!grouped[s.date]) grouped[s.date] = []; grouped[s.date].push(s); });
            const sortedDates = Object.keys(grouped).sort().reverse();
            logDiv.innerHTML = sortedDates.map(date => {
                const d = new Date(date + 'T12:00:00');
                const dateLabel = d.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });
                const daySessions = grouped[date];
                const dayMins = Math.round(daySessions.filter(s => !s.skipped).reduce((sum, s) => sum + s.duration, 0) / 60);
                const rowsHTML = daySessions.map(s => `
                    <div class="flex items-center gap-4 py-3 border-t border-white/5 first:border-t-0">
                        <span class="material-symbols-outlined text-[18px] ${s.skipped ? 'text-gray-600' : 'text-cyan-400'}">${s.skipped ? 'cancel' : 'check_circle'}</span>
                        <div class="flex-1 min-w-0">
                            <div class="text-sm font-bold ${s.skipped ? 'text-gray-500 line-through' : 'text-white'}">${s.task || 'Focus Session'}</div>
                            <div class="text-xs text-gray-500">${formatDuration(s.duration)} ${s.time ? '· ' + s.time : ''}</div>
                        </div>
                        ${s.skipped ? '<span class="text-xs text-gray-600 font-bold">skipped</span>' : ''}
                    </div>`).join('');
                return `<div class="glass-panel rounded-2xl p-5">
                    <div class="flex items-center justify-between mb-2">
                        <span class="font-black text-sm">${dateLabel}</span>
                        <span class="text-xs text-cyan-400 font-bold">${dayMins}m focused</span>
                    </div>
                    ${rowsHTML}
                </div>`;
            }).join('');
        }

        render();
    </script>
</body>
</html>
