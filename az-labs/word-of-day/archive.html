<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZ Labs | Word Archive</title>
    <link rel="icon" type="image/png" href="../../favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: white; min-height: 100vh; overflow-x: hidden; }
        .bg-animated { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(-45deg, #1a1200, #0f172a, #1a0e00, #0f172a); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        @keyframes gradientBG { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        .glass-panel { background: rgba(255,255,255,0.03); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .word-card { transition: all 0.25s ease; }
        .word-card:hover { background: rgba(255,255,255,0.06); transform: translateY(-2px); }
        .nav-link { position: relative; transition: color 0.2s; }
        .nav-link::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 0; height: 2px; background: #f59e0b; transition: width 0.3s; }
        .nav-link:hover::after { width: 100%; }
        details summary { cursor: pointer; list-style: none; }
        details summary::-webkit-details-marker { display: none; }
        details[open] summary .chevron { transform: rotate(180deg); }
        .chevron { transition: transform 0.3s; }
    </style>
</head>
<body>
    <div class="bg-animated"></div>

    <!-- Header -->
    <header class="glass-panel border-b border-white/5 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="../index.html" class="text-sm font-bold text-gray-500 hover:text-gray-300 transition flex items-center gap-1">
                    <span class="material-symbols-outlined text-[16px]">arrow_back</span> AZ Labs
                </a>
                <span class="text-gray-700">/</span>
                <span class="text-lg font-black text-white flex items-center gap-2">📖 Word of the Day</span>
            </div>
            <nav class="hidden md:flex items-center gap-6 text-sm font-semibold text-gray-400">
                <a href="index.html" class="nav-link hover:text-white transition">Today</a>
                <a href="archive.html" class="text-amber-300 transition">Archive</a>
            </nav>
            <button onclick="document.getElementById('mobileMenu').classList.toggle('hidden')" class="md:hidden p-2 rounded-lg hover:bg-white/10 transition">
                <span class="material-symbols-outlined">menu</span>
            </button>
        </div>
        <div id="mobileMenu" class="hidden md:hidden border-t border-white/5 px-6 py-4 flex gap-6 text-sm font-semibold text-gray-400">
            <a href="index.html" class="hover:text-white transition">Today</a>
            <a href="archive.html" class="text-amber-300">Archive</a>
        </div>
    </header>

    <!-- Main -->
    <main class="max-w-3xl mx-auto px-6 pt-12 pb-32 space-y-10">

        <div class="space-y-2">
            <h1 class="text-4xl font-black">Word Archive 📚</h1>
            <p class="text-gray-400">Every word, all in one place. Your personal lexicon growing daily.</p>
        </div>

        <!-- Search + filter -->
        <div class="flex gap-3 flex-col sm:flex-row">
            <div class="relative flex-1">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-[20px]">search</span>
                <input type="text" id="searchInput" placeholder="Search words..." oninput="renderArchive()"
                    class="w-full bg-black/30 border border-white/10 rounded-xl pl-10 pr-4 py-3 text-white text-sm focus:outline-none focus:border-amber-500 transition">
            </div>
            <select id="filterPos" onchange="renderArchive()"
                class="bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-gray-300 text-sm focus:outline-none focus:border-amber-500 transition">
                <option value="">All parts of speech</option>
                <option value="adjective">Adjective</option>
                <option value="noun">Noun</option>
                <option value="verb">Verb</option>
            </select>
        </div>

        <!-- Saved words section -->
        <div class="space-y-4">
            <div class="flex items-center justify-between">
                <h2 class="font-black text-lg flex items-center gap-2">
                    <span class="material-symbols-outlined text-amber-400 text-[20px]">bookmark</span>
                    Your Saved Words
                    <span id="savedCount" class="text-sm font-normal text-gray-500"></span>
                </h2>
                <button onclick="clearSaved()" class="text-xs text-red-400 hover:text-red-300 font-bold transition flex items-center gap-1">
                    <span class="material-symbols-outlined text-[14px]">delete</span> Clear
                </button>
            </div>
            <div id="savedList" class="space-y-3"></div>
        </div>

        <!-- Full word bank -->
        <div class="space-y-4">
            <h2 class="font-black text-lg flex items-center gap-2">
                <span class="material-symbols-outlined text-amber-400 text-[20px]">auto_stories</span>
                Full Word Bank
                <span id="wordCount" class="text-sm font-normal text-gray-500"></span>
            </h2>
            <div id="wordList" class="space-y-3"></div>
            <div id="noResults" class="hidden glass-panel rounded-2xl p-6 text-center text-gray-500 text-sm">No words match your search.</div>
        </div>

    </main>

    <script>
        const WORDS_DB = [
            { word:'Perspicacious', phonetic:'/ˌpɜː.spɪˈkeɪ.ʃəs/', pos:'adjective', etym:'From Latin perspicax "sharp-sighted"', definition:'Having a ready insight into things; shrewdly perceptive and understanding.', example:'The perspicacious student quickly identified the flaw in the professor\'s argument, earning a standing round of applause.', synonyms:['astute','shrewd','discerning','perceptive','keen'] },
            { word:'Ephemeral', phonetic:'/ɪˈfem.ər.əl/', pos:'adjective', etym:'From Greek ephemeros "lasting only a day"', definition:'Lasting for a very short time; transitory.', example:'The ephemeral beauty of cherry blossoms reminds us to appreciate every fleeting moment of joy.', synonyms:['transient','fleeting','momentary','brief','short-lived'] },
            { word:'Sonder', phonetic:'/ˈsɒn.dər/', pos:'noun', etym:'Coined by John Koenig in "The Dictionary of Obscure Sorrows"', definition:'The profound realization that each passerby has a life as vivid and complex as your own.', example:'Walking through the busy market, she was struck by a deep sonder — each face hiding a universe of stories.', synonyms:['empathy','awareness','introspection','insight'] },
            { word:'Loquacious', phonetic:'/ləʊˈkweɪ.ʃəs/', pos:'adjective', etym:'From Latin loquax "chatty", from loqui "to speak"', definition:'Tending to talk a great deal; talkative.', example:'The loquacious lecturer barely paused for breath during the three-hour class, yet the students hung on every word.', synonyms:['talkative','garrulous','voluble','verbose','chatty'] },
            { word:'Ineffable', phonetic:'/ɪˈnef.ə.bəl/', pos:'adjective', etym:'From Latin ineffabilis "unutterable"', definition:'Too great or extreme to be expressed or described in words.', example:'Standing at the edge of the cliff at sunrise, she felt an ineffable sense of wonder and smallness.', synonyms:['indescribable','inexpressible','unutterable','beyond words'] },
            { word:'Serendipity', phonetic:'/ˌser.ənˈdɪp.ɪ.ti/', pos:'noun', etym:'Coined by Horace Walpole from a Persian fairy tale "The Three Princes of Serendip"', definition:'The occurrence and development of events by chance in a happy or beneficial way.', example:'Finding his future business partner at the wrong bus stop was pure serendipity.', synonyms:['luck','fortune','chance','happy accident','fluke'] },
            { word:'Resilience', phonetic:'/rɪˈzɪl.i.əns/', pos:'noun', etym:'From Latin resilire "to spring back"', definition:'The capacity to recover quickly from difficulties; toughness.', example:'Her resilience after failing the exam was remarkable — she returned stronger, with a new study strategy.', synonyms:['toughness','fortitude','grit','tenacity','durability'] },
            { word:'Eloquent', phonetic:'/ˈel.ə.kwənt/', pos:'adjective', etym:'From Latin eloquens "speaking out"', definition:'Fluent or persuasive in speaking or writing.', example:'The eloquent presentation moved the judges to award her the scholarship without hesitation.', synonyms:['articulate','fluent','expressive','persuasive','well-spoken'] },
            { word:'Magnanimous', phonetic:'/mæɡˈnæn.ɪ.məs/', pos:'adjective', etym:'From Latin magnanimus "great-souled"', definition:'Very generous or forgiving, especially towards a rival or someone less powerful.', example:'Despite winning the debate competition, she was magnanimous in victory and praised her opponent\'s strong arguments.', synonyms:['generous','noble','gracious','charitable','big-hearted'] },
            { word:'Quintessential', phonetic:'/ˌkwɪn.tɪˈsen.ʃəl/', pos:'adjective', etym:'From medieval Latin quinta essentia "fifth essence"', definition:'Representing the most perfect or typical example of a quality or class.', example:'He is the quintessential academic weapon — first in class, but still making time for his friends.', synonyms:['archetypal','classic','definitive','exemplary','ideal'] },
            { word:'Audacious', phonetic:'/ɔːˈdeɪ.ʃəs/', pos:'adjective', etym:'From Latin audax "bold", from audere "to dare"', definition:'Showing a willingness to take surprisingly bold risks.', example:'The audacious startup launched in three countries simultaneously on its very first day of operation.', synonyms:['bold','daring','fearless','brave','brazen'] },
            { word:'Tenacity', phonetic:'/tɪˈnæs.ɪ.ti/', pos:'noun', etym:'From Latin tenax "holding fast"', definition:'The quality or fact of being very determined; determination.', example:'Her tenacity in pursuing her research, despite years of setbacks, finally resulted in a groundbreaking discovery.', synonyms:['persistence','determination','grit','perseverance','stubbornness'] },
        ];

        const STORAGE_KEY = 'azlabs_savedWords';

        function getSavedWords() {
            try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
        }

        function clearSaved() {
            if (!confirm('Remove all saved words?')) return;
            localStorage.removeItem(STORAGE_KEY);
            renderArchive();
        }

        function saveWord(word) {
            const saved = getSavedWords();
            const entry = WORDS_DB.find(w => w.word === word);
            if (!entry || saved.some(w => w.word === word)) return;
            saved.unshift({ ...entry, savedDate: new Date().toISOString().split('T')[0] });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
            renderArchive();
        }

        function unsaveWord(word) {
            const saved = getSavedWords().filter(w => w.word !== word);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
            renderArchive();
        }

        function wordCardHTML(w, isSaved, showSaveBtn) {
            const synonymBadges = w.synonyms.map(s => `<span class="px-2 py-0.5 rounded-full text-xs bg-amber-500/10 border border-amber-500/20 text-amber-300">${s}</span>`).join('');
            return `<details class="glass-panel word-card rounded-2xl overflow-hidden">
                <summary class="flex items-center justify-between p-5 gap-4">
                    <div class="flex items-center gap-3 flex-1 min-w-0">
                        <div>
                            <span class="font-black text-amber-300 text-lg">${w.word}</span>
                            <span class="text-gray-500 text-sm ml-2 italic">${w.pos}</span>
                        </div>
                        <span class="text-xs text-gray-600 hidden sm:block italic truncate">${w.phonetic}</span>
                    </div>
                    <div class="flex items-center gap-2 flex-shrink-0">
                        ${isSaved ? `<span class="material-symbols-outlined text-amber-400 text-[18px]">bookmark_added</span>` : ''}
                        <span class="material-symbols-outlined text-gray-500 chevron text-[18px]">expand_more</span>
                    </div>
                </summary>
                <div class="px-5 pb-5 pt-0 space-y-4 border-t border-white/5">
                    <p class="text-xs text-gray-600 italic">${w.etym}</p>
                    <p class="text-gray-200 leading-relaxed">${w.definition}</p>
                    <blockquote class="border-l-4 border-amber-500/40 pl-4">
                        <p class="text-gray-300 text-sm italic">"${w.example}"</p>
                    </blockquote>
                    <div class="flex flex-wrap gap-1.5">${synonymBadges}</div>
                    <div class="flex gap-2 pt-1">
                        ${showSaveBtn ? `<button onclick="saveWord('${w.word}')" class="text-xs font-bold px-3 py-1.5 rounded-full bg-amber-500/15 border border-amber-500/30 text-amber-300 hover:bg-amber-500/30 transition flex items-center gap-1">
                            <span class="material-symbols-outlined text-[14px]">bookmark</span> Save
                        </button>` : `<button onclick="unsaveWord('${w.word}')" class="text-xs font-bold px-3 py-1.5 rounded-full bg-red-500/15 border border-red-500/30 text-red-300 hover:bg-red-500/30 transition flex items-center gap-1">
                            <span class="material-symbols-outlined text-[14px]">bookmark_remove</span> Remove
                        </button>`}
                    </div>
                </div>
            </details>`;
        }

        function renderArchive() {
            const query = (document.getElementById('searchInput').value || '').toLowerCase();
            const posFilter = document.getElementById('filterPos').value;
            const saved = getSavedWords();
            const savedWords = new Set(saved.map(w => w.word));

            // Saved section
            const savedFiltered = saved.filter(w => {
                const matchQuery = !query || w.word.toLowerCase().includes(query) || w.definition.toLowerCase().includes(query);
                const matchPos = !posFilter || w.pos === posFilter;
                return matchQuery && matchPos;
            });
            document.getElementById('savedCount').textContent = `(${savedFiltered.length})`;
            const savedList = document.getElementById('savedList');
            if (!savedFiltered.length) {
                savedList.innerHTML = '<div class="glass-panel rounded-2xl p-4 text-center text-gray-500 text-sm">No saved words yet. Go to <a href="index.html" class="text-amber-400 underline">Today\'s word</a> and save it!</div>';
            } else {
                savedList.innerHTML = savedFiltered.map(w => wordCardHTML(w, true, false)).join('');
            }

            // Full word bank
            const allFiltered = WORDS_DB.filter(w => {
                const matchQuery = !query || w.word.toLowerCase().includes(query) || w.definition.toLowerCase().includes(query) || w.synonyms.some(s => s.toLowerCase().includes(query));
                const matchPos = !posFilter || w.pos === posFilter;
                return matchQuery && matchPos;
            });
            document.getElementById('wordCount').textContent = `(${allFiltered.length} of ${WORDS_DB.length})`;
            const wordList = document.getElementById('wordList');
            const noResults = document.getElementById('noResults');
            if (!allFiltered.length) {
                wordList.innerHTML = '';
                noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
                wordList.innerHTML = allFiltered.map(w => wordCardHTML(w, savedWords.has(w.word), !savedWords.has(w.word))).join('');
            }
        }

        renderArchive();
    </script>
</body>
</html>
