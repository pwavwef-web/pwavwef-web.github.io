<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Meet the AZ Learner Team – the people building tools to help students learn smarter." />
  <meta name="author" content="AZ Learner" />
  <title>Meet the Team | AZ Learner</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="../favicon.png" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap"
    rel="stylesheet"
  />

  <!-- Team Styles -->
  <link rel="stylesheet" href="css/team.css" />
</head>
<body>

  <!-- Animated gradient background -->
  <div class="bg-animated" aria-hidden="true"></div>

  <!-- ===== SITE HEADER ===== -->
  <header class="site-header">
    <div class="container header-inner">
      <!-- Logo / Brand -->
      <a class="site-logo" href="../index.html">AZ LEARNER</a>

      <!-- Back to main site -->
      <nav class="header-nav" aria-label="Site navigation">
        <a class="nav-back" href="../index.html" aria-label="Back to AZ Learner home">
          <!-- Arrow left icon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/>
          </svg>
          Home
        </a>
      </nav>
    </div>
  </header>

  <!-- ===== HERO SECTION ===== -->
  <section class="page-hero" aria-labelledby="hero-heading">
    <div class="container">
      <!-- Badge -->
      <div class="hero-badge" aria-hidden="true">
        <span></span>
        AZ Learner Team
      </div>

      <!-- Heading -->
      <h1 id="hero-heading">
        Meet the <span class="text-gradient">AZ Learner</span> Team
      </h1>

      <!-- Subtitle -->
      <p>The people building tools to help students learn smarter.</p>
    </div>
  </section>

  <!-- ===== TEAM GRID SECTION ===== -->
  <main class="team-section">
    <div class="container">
      <!-- Cards are injected here by team.js -->
      <div id="team-grid" class="team-grid" role="list" aria-label="Team members"></div>
    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <p>Built by the <a href="../index.html">AZ Learner Team</a> &mdash; helping students learn smarter.</p>
  </footer>

  <!-- Team JS (loads & renders cards from team-data.json) -->
  <script src="js/team.js"></script>

</body>
</html>
