  <link rel="icon" type="image/png" href="../../favicon.png" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    /* ── Reset & Base ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand-blue:       #3b82f6;
      --brand-blue-dark:  #1d4ed8;
      --brand-orange:     #FFAB40;
      --brand-purple:     #a855f7;
      --brand-teal:       #14b8a6;
      --bg-dark:          #0f172a;
      --bg-card:          #1e293b;
      --text-primary:     #f1f5f9;
      --text-secondary:   #94a3b8;
      /* Standard business card: 3.5in × 2in.
         We render at 100px/in → 350×200 px. */
      --bc-w: 350px;
      --bc-h: 200px;
      --bc-radius: 12px;
      --transition-med:   0.3s ease;
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Animated Background ──────────────────────── */
    .bg-animated {
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 35%, #0f172a 65%, #0c1a2e 100%);
      background-size: 400% 400%;
      animation: bgShift 18s ease infinite;
    }
    @keyframes bgShift {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    /* ── Header ───────────────────────────────────── */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,23,42,.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    .header-inner {
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }
    .site-logo {
      font-size: 1.2rem; font-weight: 800; letter-spacing: .08em;
      background: linear-gradient(90deg, var(--brand-blue), var(--brand-purple));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .nav-back {
      display: flex; align-items: center; gap: 6px;
      color: var(--text-secondary); font-size: .9rem; text-decoration: none;
      transition: color var(--transition-med);
    }
    .nav-back svg { width: 16px; height: 16px; }
    .nav-back:hover { color: var(--text-primary); }

    /* ── Page Hero ────────────────────────────────── */
    .page-hero {
      text-align: center;
      padding: 64px 20px 40px;
    }
    .page-hero h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--brand-blue), var(--brand-purple), var(--brand-orange));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }
    .page-hero p {
      color: var(--text-secondary);
      font-size: 1.05rem;
      max-width: 560px;
      margin: 0 auto;
    }
    .page-hero .hint {
      margin-top: 10px;
      font-size: .88rem;
      color: rgba(148,163,184,.65);
    }

    /* ── Cards Grid ───────────────────────────────── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 48px 40px;
      padding: 0 20px 80px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── Card Wrapper ─────────────────────────────── */
    .card-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .card-member-label {
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    /* ── Flip Scene ───────────────────────────────── */
    .flip-scene {
      width: var(--bc-w);
      perspective: 900px;
    }
    .flip-scene:hover .flipper,
    .flip-scene:focus-within .flipper {
      transform: rotateY(180deg);
    }
    .flipper {
      position: relative;
      width: var(--bc-w);
      height: var(--bc-h);
      transform-style: preserve-3d;
      transition: transform .55s cubic-bezier(.4,0,.2,1);
      cursor: pointer;
    }
    .bc-face {
      position: absolute; inset: 0;
      width: var(--bc-w);
      height: var(--bc-h);
      border-radius: var(--bc-radius);
      overflow: hidden;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      box-shadow: 0 16px 48px rgba(0,0,0,.65), 0 0 0 1px rgba(255,255,255,.07);
    }

    /* Back face starts rotated 180° so it's hidden until flip */
    .bc-back { transform: rotateY(180deg); }

    /* ── FRONT FACE ───────────────────────────────── */
    .bc-front {
      display: flex;
      align-items: stretch;
      /* background set per-card via JS */
    }

    /* Left stripe: photo + org logo */
    .bc-front-left {
      width: 120px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 12px;
      position: relative;
      /* subtle inner glow strip – colour injected via JS */
    }
    .bc-front-left::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 1px; height: 100%;
      background: rgba(255,255,255,.1);
    }

    .bc-photo-ring {
      width: 64px; height: 64px;
      border-radius: 50%;
      padding: 2px;
      flex-shrink: 0;
      /* ring gradient set per card via JS */
    }
    .bc-photo {
      width: 60px; height: 60px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(15,23,42,.85);
      display: block;
    }
    .bc-org-logo {
      font-size: .55rem;
      font-weight: 800;
      letter-spacing: .1em;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.3;
      /* colour set per card */
    }

    /* Right content */
    .bc-front-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 16px 18px 12px 16px;
      gap: 0;
    }
    .bc-name {
      font-size: .98rem;
      font-weight: 800;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 4px;
    }
    .bc-role {
      font-size: .65rem;
      font-weight: 600;
      color: rgba(255,255,255,.7);
      margin-bottom: 10px;
      line-height: 1.3;
    }
    .bc-divider {
      height: 1px;
      background: rgba(255,255,255,.1);
      margin-bottom: 10px;
    }
    .bc-contact {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .bc-contact-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .6rem;
      color: rgba(255,255,255,.55);
      overflow: hidden;
    }
    .bc-contact-row svg {
      width: 9px; height: 9px;
      flex-shrink: 0;
      opacity: .7;
    }
    .bc-contact-row span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .bc-front-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
    }

    /* ── BACK FACE ────────────────────────────────── */
    .bc-back {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 24px;
      text-align: center;
      position: relative;
      /* background set per-card via JS */
    }

    /* decorative circles */
    .bc-back-deco-tl,
    .bc-back-deco-br {
      position: absolute;
      border-radius: 50%;
      opacity: .12;
      pointer-events: none;
    }
    .bc-back-deco-tl {
      width: 120px; height: 120px;
      top: -40px; left: -40px;
    }
    .bc-back-deco-br {
      width: 100px; height: 100px;
      bottom: -30px; right: -30px;
    }

    .bc-back-logo {
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 3px;
      /* gradient text set per card via JS */
    }
    .bc-back-tagline {
      font-size: .6rem;
      font-weight: 600;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: rgba(255,255,255,.4);
      margin-bottom: 12px;
    }
    .bc-back-skills {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      justify-content: center;
      margin-bottom: 12px;
    }
    .bc-back-skill {
      font-size: .55rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 100px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.65);
    }
    .bc-back-socials {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 10px;
    }
    .bc-social-link {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: .55rem;
      color: rgba(255,255,255,.45);
      text-decoration: none;
    }
    .bc-social-link svg { width: 9px; height: 9px; }
    .bc-back-url {
      font-size: .6rem;
      font-weight: 600;
      letter-spacing: .04em;
      color: rgba(255,255,255,.3);
    }
    .bc-back-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }

    /* ── Flip hint label ──────────────────────────── */
    .flip-hint {
      font-size: .72rem;
      color: rgba(148,163,184,.5);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .flip-hint svg { width: 13px; height: 13px; }

    /* ── Download Buttons ─────────────────────────── */
    .card-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: linear-gradient(135deg, var(--brand-blue), var(--brand-blue-dark));
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 9px 18px;
      font-size: .83rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: opacity var(--transition-med), transform var(--transition-med), box-shadow var(--transition-med);
      box-shadow: 0 4px 16px rgba(59,130,246,.32);
    }
    .btn-download svg { width: 15px; height: 15px; flex-shrink: 0; }
    .btn-download:hover {
      opacity: .9;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(59,130,246,.48);
    }
    .btn-download:active { transform: translateY(0); }
    .btn-download.loading { opacity: .65; pointer-events: none; }
    .btn-download.btn-secondary {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: none;
    }
    .btn-download.btn-secondary:hover {
      background: rgba(255,255,255,.1);
      box-shadow: none;
    }

    /* ── Loading / Error States ───────────────────── */
    .state-wrap {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 16px;
      padding: 80px 20px; text-align: center;
    }
    .spinner {
      width: 42px; height: 42px;
      border: 3px solid rgba(255,255,255,.1);
      border-top-color: var(--brand-blue);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state-wrap p { color: var(--text-secondary); }
    .error-icon { font-size: 2.5rem; }
    .error-msg { color: #f87171; font-weight: 600; }

    /* ── Footer ───────────────────────────────────── */
    footer {
      border-top: 1px solid rgba(255,255,255,.06);
      padding: 28px 20px;
      text-align: center;
      color: var(--text-secondary);
      font-size: .88rem;
    }
    footer a { color: var(--brand-blue); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── Responsive ───────────────────────────────── */
    @media (max-width: 540px) {
      .cards-grid { grid-template-columns: 1fr; justify-items: center; }
      .flip-scene { transform-origin: center top; }
    }
  </style>
</head>

        stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;
    const ICON_SPIN = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>`;
    const ICON_FLIP = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
        </svg>`;

    /* Extract a clean username/handle from a social profile URL */
    function extractHandle(url, domainPattern) {
      if (!url) return '';
      return url.replace(domainPattern, '').replace(/[?#].*$/, '').replace(/\/$/, '');
    }

    /* Resolve image path relative to this file (team/assets/cards.html) */
    function resolveImage(src) {
      if (!src) return 'images/placeholder.svg';
      if (src.startsWith('http')) return src;
      return src.replace(/^assets\/images\//, 'images/');
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    /* Build one social contact row for the front face */
    function contactRow(iconSvg, text) {
      const row = document.createElement('div');
      row.className = 'bc-contact-row';
      row.innerHTML = iconSvg;
      const span = document.createElement('span');
      span.textContent = text;
      row.appendChild(span);
      return row;
    }

    /* Build one social link pill for the back face */
    function socialLink(iconSvg, label, href) {
      if (!href) return null;
      const a = document.createElement('span');
      a.className = 'bc-social-link';
      a.setAttribute('aria-label', label);
      a.innerHTML = iconSvg;
      const t = document.createElement('span');
      t.textContent = label;
      a.appendChild(t);
      return a;
    }

    function buildCard(member, idx) {
      const pal    = PALETTES[idx % PALETTES.length];
      const imgSrc = resolveImage(member.image);
      const skills = (member.skills || []).slice(0, 5);
      const socials = member.socials || {};

      const wrapper = document.createElement('div');
      wrapper.className = 'card-wrapper';

      /* ── member label ── */
      const lbl = document.createElement('p');
      lbl.className = 'card-member-label';
      lbl.textContent = member.name;
      wrapper.appendChild(lbl);

      /* ── Flip scene container ── */
      const scene = document.createElement('div');
      scene.className = 'flip-scene';
      scene.setAttribute('tabindex', '0');
      scene.setAttribute('aria-label', `Business card for ${escapeHtml(member.name)} — hover or focus to flip`);

      const flipper = document.createElement('div');
      flipper.className = 'flipper';
      flipper.id = `flipper-${idx}`;

      /* ════════════════════════════
         FRONT FACE
         ════════════════════════════ */
      const front = document.createElement('div');
      front.className = 'bc-face bc-front';
      front.id = `front-${idx}`;
      front.style.background = pal.bg;

      /* Left column */
      const leftCol = document.createElement('div');
      leftCol.className = 'bc-front-left';

      const ring = document.createElement('div');
      ring.className = 'bc-photo-ring';
      ring.style.background = pal.ring;

      const img = document.createElement('img');
      img.className = 'bc-photo';
      img.src = imgSrc;
      img.alt = `Photo of ${escapeHtml(member.name)}`;
      img.loading = 'eager';
      img.onerror = function() { this.src = 'images/placeholder.svg'; };

      ring.appendChild(img);

      const orgLogo = document.createElement('div');
      orgLogo.className = 'bc-org-logo';
      orgLogo.style.background = pal.logoGrad;
      orgLogo.style.webkitBackgroundClip = 'text';
      orgLogo.style.webkitTextFillColor = 'transparent';
      orgLogo.style.backgroundClip = 'text';
      orgLogo.textContent = 'AZ\nLEARNER';
      orgLogo.style.whiteSpace = 'pre';

      leftCol.appendChild(ring);
      leftCol.appendChild(orgLogo);

      /* Right column */
      const rightCol = document.createElement('div');
      rightCol.className = 'bc-front-right';

      const nameEl = document.createElement('h2');
      nameEl.className = 'bc-name';
      nameEl.textContent = member.name;

      const roleEl = document.createElement('p');
      roleEl.className = 'bc-role';
      roleEl.textContent = member.role;

      const divider = document.createElement('div');
      divider.className = 'bc-divider';

      const contact = document.createElement('div');
      contact.className = 'bc-contact';
      contact.appendChild(contactRow(ICON_GLOBE, 'azlearner.me/team'));
      if (socials.linkedin) {
        contact.appendChild(contactRow(ICON_LINKEDIN,
          'in/' + extractHandle(socials.linkedin, /.*linkedin\.com\/in\//)));
      }
      if (socials.twitter) {
        contact.appendChild(contactRow(ICON_TWITTER,
          '@' + extractHandle(socials.twitter, /.*(?:twitter\.com|x\.com)\//)));
      }
      if (socials.github) {
        contact.appendChild(contactRow(ICON_GITHUB,
          extractHandle(socials.github, /.*github\.com\//)));
      }

      rightCol.appendChild(nameEl);
      rightCol.appendChild(roleEl);
      rightCol.appendChild(divider);
      rightCol.appendChild(contact);

      /* bottom accent bar */
      const frontBar = document.createElement('div');
      frontBar.className = 'bc-front-bar';
      frontBar.style.background = pal.bar;

      front.appendChild(leftCol);
      front.appendChild(rightCol);
      front.appendChild(frontBar);

      /* ════════════════════════════
         BACK FACE
         ════════════════════════════ */
      const back = document.createElement('div');
      back.className = 'bc-face bc-back';
      back.id = `back-${idx}`;
      back.style.background = pal.bgBack;

      /* decorative circles */
      const decoTL = document.createElement('div');
      decoTL.className = 'bc-back-deco-tl';
      decoTL.style.background = pal.glow;

      const decoBR = document.createElement('div');
      decoBR.className = 'bc-back-deco-br';
      decoBR.style.background = pal.glow;

      /* top accent bar */
      const backBar = document.createElement('div');
      backBar.className = 'bc-back-bar';
      backBar.style.background = pal.bar;

      /* logo */
      const logoEl = document.createElement('div');
      logoEl.className = 'bc-back-logo';
      logoEl.style.background = pal.logoGrad;
      logoEl.style.webkitBackgroundClip = 'text';
      logoEl.style.webkitTextFillColor = 'transparent';
      logoEl.style.backgroundClip = 'text';
      logoEl.textContent = 'AZ LEARNER';

      /* tagline */
      const tagline = document.createElement('p');
      tagline.className = 'bc-back-tagline';
      tagline.textContent = 'Print · Chat · Grind · Shine';

      /* skills */
      const skillsEl = document.createElement('div');
      skillsEl.className = 'bc-back-skills';
      skills.forEach(s => {
        const pill = document.createElement('span');
        pill.className = 'bc-back-skill';
        pill.textContent = s;
        skillsEl.appendChild(pill);
      });

      /* social links */
      const socialsEl = document.createElement('div');
      socialsEl.className = 'bc-back-socials';
      [
        socialLink(ICON_LINKEDIN, 'LinkedIn', socials.linkedin),
        socialLink(ICON_TWITTER,  'X/Twitter', socials.twitter),
        socialLink(ICON_GITHUB,   'GitHub', socials.github)
      ].forEach(el => { if (el) socialsEl.appendChild(el); });

      /* profile URL — normalise to "team/profiles/<slug>" regardless of stored path prefix */
      const profileSlug = (member.profile || '')
        .replace(/^(team\/)?profiles\//, '')
        .replace(/^.*\//, '');
      const urlEl = document.createElement('p');
      urlEl.className = 'bc-back-url';
      urlEl.textContent = profileSlug
        ? `azlearner.me/team/profiles/${profileSlug}`
        : 'azlearner.me/team';

      back.appendChild(decoTL);
      back.appendChild(decoBR);
      back.appendChild(backBar);
      back.appendChild(logoEl);
      back.appendChild(tagline);
      back.appendChild(skillsEl);
      if (socialsEl.children.length) back.appendChild(socialsEl);
      back.appendChild(urlEl);

      /* ── assemble flip card ── */
      flipper.appendChild(front);
      flipper.appendChild(back);
      scene.appendChild(flipper);
      wrapper.appendChild(scene);

      /* ── flip hint ── */
      const hint = document.createElement('p');
      hint.className = 'flip-hint';
      hint.setAttribute('aria-hidden', 'true');
      hint.innerHTML = ICON_FLIP + '<span>Hover to flip</span>';
      wrapper.appendChild(hint);

      /* ── Download buttons ── */
      const actions = document.createElement('div');
      actions.className = 'card-actions';

      const btnFront = document.createElement('button');
      btnFront.className = 'btn-download';
      btnFront.setAttribute('aria-label', `Download front of ${escapeHtml(member.name)}'s business card`);
      btnFront.innerHTML = ICON_DL + '<span>Front</span>';
      btnFront.addEventListener('click', () => captureAndDownload(front, btnFront, member.name, 'front'));

      const btnBack = document.createElement('button');
      btnBack.className = 'btn-download btn-secondary';
      btnBack.setAttribute('aria-label', `Download back of ${escapeHtml(member.name)}'s business card`);
      btnBack.innerHTML = ICON_DL + '<span>Back</span>';
      btnBack.addEventListener('click', () => captureAndDownload(back, btnBack, member.name, 'back'));

      actions.appendChild(btnFront);
      actions.appendChild(btnBack);
      wrapper.appendChild(actions);

      return wrapper;
    }

    async function captureAndDownload(faceEl, btn, memberName, side) {
      if (!window.html2canvas) {
        alert('html2canvas is not loaded yet. Please wait a moment and try again.');
        return;
      }
      const originalLabel = btn.innerHTML;
      btn.classList.add('loading');
      btn.innerHTML = ICON_SPIN + '<span>Generating…</span>';

      /* Temporarily force the face to be fully visible for capture */
      const prevTransform     = faceEl.style.transform;
      const prevVisibility    = faceEl.style.visibility;
      const prevBackfaceVis   = faceEl.style.webkitBackfaceVisibility;
      faceEl.style.transform  = 'none';
      faceEl.style.visibility = 'visible';
      faceEl.style.webkitBackfaceVisibility = 'visible';
      faceEl.style.backfaceVisibility = 'visible';

      try {
        const canvas = await html2canvas(faceEl, {
          scale: 3,
          useCORS: true,
          allowTaint: false,
          backgroundColor: null,
          logging: false,
          width:  BC_W,
          height: BC_H
        });
        const link = document.createElement('a');
        const safeName = memberName.toLowerCase().replace(/\s+/g, '-');
        link.download = `az-learner-${safeName}-card-${side}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (err) {
        console.error('Download failed:', err);
        alert('Could not generate the image. Try right-clicking the card and saving, or take a screenshot.');
      } finally {
        /* Restore original state */
        faceEl.style.transform            = prevTransform;
        faceEl.style.visibility           = prevVisibility;
        faceEl.style.webkitBackfaceVisibility = prevBackfaceVis;
        faceEl.style.backfaceVisibility   = '';
        btn.classList.remove('loading');
        btn.innerHTML = originalLabel;
      }
    }

    async function init() {
      const region = document.getElementById('cards-region');

      try {
        const res = await fetch('../team-data.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const team = data.team || [];

        if (team.length === 0) throw new Error('No team members found.');

        const grid = document.createElement('div');
        grid.className = 'cards-grid';
        team.forEach((member, idx) => grid.appendChild(buildCard(member, idx)));

        region.innerHTML = '';
        region.appendChild(grid);
      } catch (err) {
        region.innerHTML = `
          <div class="state-wrap">
            <span class="error-icon" aria-hidden="true">⚠️</span>
            <p class="error-msg">Failed to load team data</p>
            <p>${escapeHtml(err.message)}</p>
          </div>
        `;
      }
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
