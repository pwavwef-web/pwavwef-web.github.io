<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The AZ Podcast</title>
    <link rel="icon" type="image/png" href="../favicon1.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { brand: '#FFAB40', brandBlue: '#448AFF' }
                }
            }
        }
    </script>
    <style>
        body { background: linear-gradient(-45deg, #020617, #0f172a, #1a0a2e, #0f172a); background-size: 400% 400%; animation: gradBG 18s ease infinite; color: white; }
        @keyframes gradBG { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .glass { background: rgba(255,255,255,0.04); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .card { transition: transform 0.2s, box-shadow 0.2s; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.5); }
        .wave-bar { display: inline-block; width: 3px; border-radius: 2px; background: #FFAB40; animation: wave 1.2s ease-in-out infinite; }
        @keyframes wave { 0%,100% { height: 6px; } 50% { height: 18px; } }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="glass border-b border-white/5 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-brand to-orange-600 flex items-center justify-center text-sm font-black">AZ</div>
                <span class="font-black text-lg tracking-tight">The AZ Podcast</span>
            </a>
            <a href="../index.html" class="text-sm text-gray-400 hover:text-white transition flex items-center gap-2">
                <i class="fa-solid fa-house"></i>
                <span class="hidden md:inline">Home</span>
            </a>
        </div>
    </nav>

    <!-- Hero -->
    <main class="flex-1 flex items-center justify-center px-6 py-16">
        <div class="max-w-2xl w-full text-center">
            <div class="inline-flex items-center gap-2 bg-brand/10 border border-brand/30 rounded-full px-4 py-1.5 text-brand text-xs font-bold uppercase tracking-widest mb-8">
                <span class="wave-bar" style="animation-delay:0s"></span>
                <span class="wave-bar" style="animation-delay:0.15s"></span>
                <span class="wave-bar" style="animation-delay:0.3s"></span>
                Now Broadcasting
            </div>
            <h1 class="text-5xl md:text-7xl font-black mb-4 leading-tight">
                The <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand to-orange-300">AZ Podcast</span>
            </h1>
            <p class="text-gray-400 text-lg mb-12">Listen to episodes or manage your podcast content.</p>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Listener card -->
                <a href="listeners/index.html"
                   class="card glass rounded-2xl p-8 flex flex-col items-center gap-4 text-center">
                    <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-brand to-orange-600 flex items-center justify-center text-3xl shadow-lg">
                        <i class="fa-solid fa-headphones"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-black mb-1">Listen</h2>
                        <p class="text-gray-400 text-sm">Browse and play all podcast episodes.</p>
                    </div>
                    <span class="mt-auto inline-flex items-center gap-2 text-brand text-sm font-bold">
                        Go to Episodes <i class="fa-solid fa-arrow-right"></i>
                    </span>
                </a>

                <!-- Admin card -->
                <a href="admin/index.html"
                   class="card glass rounded-2xl p-8 flex flex-col items-center gap-4 text-center">
                    <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-brandBlue to-blue-700 flex items-center justify-center text-3xl shadow-lg">
                        <i class="fa-solid fa-sliders"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-black mb-1">Admin</h2>
                        <p class="text-gray-400 text-sm">Upload and manage podcast episodes.</p>
                    </div>
                    <span class="mt-auto inline-flex items-center gap-2 text-brandBlue text-sm font-bold">
                        Go to Admin <i class="fa-solid fa-arrow-right"></i>
                    </span>
                </a>
            </div>
        </div>
    </main>

    <footer class="text-center text-gray-600 text-xs py-6">
        &copy; 2025 The AZ Podcast. All rights reserved.
    </footer>

</body>
</html>
