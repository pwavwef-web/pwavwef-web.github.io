    <style>
        :root {
            --brand-blue: #3b82f6;
            --brand-orange: #FFAB40;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a;
            color: white;
        }
        .bg-animated {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(-45deg, #020617, #0f172a, #1e3a8a, #172554);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glow-text {
            text-shadow: 0 0 40px rgba(59, 130, 246, 0.6);
        }
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .btn-secondary:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.14);
        }
        .float-anim {
            animation: floatUpDown 3s ease-in-out infinite;
        }
        @keyframes floatUpDown {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <div class="bg-animated"></div>

    <!-- Navigation -->

    </nav>

    <!-- Main content -->

                </a>
                <button onclick="history.back()" class="btn-secondary rounded-xl px-6 py-3 font-semibold text-white inline-flex items-center justify-center gap-2">

        &copy; <span id="year"></span> AZ Learner &mdash; Francis Pwavwe Production

        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
