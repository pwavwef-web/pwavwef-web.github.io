<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZ Learner | UCC Tactical Nav</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: white; min-height: 100vh; }
        .bg-animated { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(-45deg, #020617, #0f172a, #1e3a8a, #172554); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        @keyframes gradientBG { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        .glass-panel { background: rgba(255,255,255,0.03); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .toast-enter { opacity:0; transform:translateX(100%); }
        .toast-enter-active { opacity:1; transform:translateX(0); transition:all .3s ease; }
        .toast-exit-active { opacity:0; transform:translateX(100%); transition:all .3s ease; }
    </style>
</head>
<body>
    <div class="bg-animated"></div>
    <div id="toast-container" class="fixed top-20 right-6 z-[300] flex flex-col gap-2 pointer-events-none"></div>

    <!-- Header -->
    <header class="glass-panel border-b border-white/5 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="index.html" class="text-xl font-black tracking-tight text-white hover:text-blue-300 transition">AZ LEARNER</a>
            <nav class="hidden md:flex items-center gap-6 text-sm font-semibold text-gray-400">
                <a href="events.html" class="hover:text-white transition">Events</a>
                <a href="gpa.html" class="hover:text-white transition">GPA Calc</a>
                <a href="leaderboard.html" class="hover:text-white transition">Arena</a>
                <a href="blog.html" class="hover:text-white transition">Blog</a>
                <a href="past-questions.html" class="hover:text-white transition">Past Qs</a>
                <a href="print.html" class="hover:text-white transition">Print</a>
                <a href="map.html" class="text-white transition">Map</a>
            </nav>
            <div class="flex items-center gap-3">
                <a href="notifications.html" class="p-2 rounded-full hover:bg-white/10 transition text-gray-300 hover:text-white">
                    <span class="material-symbols-outlined text-xl">notifications</span>
                </a>
                <button onclick="document.getElementById('mobileMenu').classList.toggle('hidden')" class="md:hidden p-2 rounded-lg hover:bg-white/10 transition">
                    <span class="material-symbols-outlined">menu</span>
                </button>
            </div>
        </div>
        <div id="mobileMenu" class="hidden md:hidden border-t border-white/5 px-6 py-4 grid grid-cols-3 gap-3 text-center text-xs font-semibold text-gray-400">
            <a href="events.html" class="py-2 hover:text-white transition">Events</a>
            <a href="gpa.html" class="py-2 hover:text-white transition">GPA Calc</a>
            <a href="leaderboard.html" class="py-2 hover:text-white transition">Arena</a>
            <a href="blog.html" class="py-2 hover:text-white transition">Blog</a>
            <a href="past-questions.html" class="py-2 hover:text-white transition">Past Qs</a>
            <a href="print.html" class="py-2 hover:text-white transition">Print</a>
            <a href="map.html" class="col-span-3 py-2 text-white">Map</a>
        </div>
    </header>

    <!-- Page Content -->
    <main class="max-w-2xl mx-auto px-6 py-12">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-500/20 rounded-2xl mx-auto flex items-center justify-center mb-4 border border-blue-500/30">
                <span class="material-symbols-outlined text-3xl text-blue-400">navigation</span>
            </div>
            <h1 class="text-3xl font-black text-white mb-2">UCC Tactical Nav 🧭</h1>
            <p id="gps-status" class="text-gray-400 text-sm">Requesting GPS...</p>
        </div>

        <!-- Map -->
        <div class="glass-panel rounded-2xl overflow-hidden border border-white/10 mb-6 relative">
            <div class="h-72 md:h-96 bg-gray-900 relative">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3974.229267926343!2d-1.292150685237894!3d5.105432396294784!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xfde2e44a95447b9%3A0x2d05777402660d2b!2sUniversity%20of%20Cape%20Coast!5e0!3m2!1sen!2sgh!4v1705628543599!5m2!1sen!2sgh"
                    width="100%" height="100%"
                    style="border:0; filter: invert(90%) hue-rotate(180deg) contrast(90%);"
                    allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
                </iframe>
                <div class="absolute inset-0 pointer-events-none border-[4px] border-blue-500/20 rounded-2xl"></div>
            </div>
        </div>

        <!-- Quick Nav Buttons -->
        <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4">Quick Routes</h2>
        <div class="grid grid-cols-2 gap-4 mb-6">
            <button onclick="startNavigation('Sam Jonah Library UCC')"
                class="py-4 rounded-xl bg-blue-600 hover:bg-blue-500 text-white text-sm font-bold transition flex flex-col items-center justify-center gap-2 shadow-lg shadow-blue-500/20">
                <span class="material-symbols-outlined text-2xl">menu_book</span>
                Route to Library
            </button>
            <button onclick="startNavigation('UCC Shuttle Station Old Site')"
                class="py-4 rounded-xl bg-white/10 hover:bg-white/20 text-white text-sm font-bold transition flex flex-col items-center justify-center gap-2">
                <span class="material-symbols-outlined text-2xl">directions_bus</span>
                Find Shuttle
            </button>
            <button onclick="startNavigation('University of Cape Coast Main Gate')"
                class="py-4 rounded-xl bg-white/10 hover:bg-white/20 text-white text-sm font-bold transition flex flex-col items-center justify-center gap-2">
                <span class="material-symbols-outlined text-2xl">gate</span>
                Main Gate
            </button>
            <button onclick="startNavigation('UCC Sports Complex')"
                class="py-4 rounded-xl bg-white/10 hover:bg-white/20 text-white text-sm font-bold transition flex flex-col items-center justify-center gap-2">
                <span class="material-symbols-outlined text-2xl">sports_soccer</span>
                Sports Complex
            </button>
            <button onclick="startNavigation('UCC Health Center')"
                class="py-4 rounded-xl bg-white/10 hover:bg-white/20 text-white text-sm font-bold transition flex flex-col items-center justify-center gap-2">
                <span class="material-symbols-outlined text-2xl">local_hospital</span>
                Health Centre
            </button>
            <button onclick="startNavigation('Oguaa Hall UCC')"
                class="py-4 rounded-xl bg-white/10 hover:bg-white/20 text-white text-sm font-bold transition flex flex-col items-center justify-center gap-2">
                <span class="material-symbols-outlined text-2xl">apartment</span>
                Oguaa Hall
            </button>
        </div>

        <!-- Custom Destination -->
        <div class="glass-panel rounded-2xl p-5 border border-white/10">
            <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-3">Custom Destination</h2>
            <div class="flex gap-2">
                <input type="text" id="custom-dest" placeholder="Enter a location on campus..."
                    class="flex-1 bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white text-sm outline-none focus:border-blue-500 transition"
                    onkeydown="if(event.key==='Enter') navigateCustom()">
                <button onclick="navigateCustom()"
                    class="px-4 py-3 bg-blue-600 hover:bg-blue-500 rounded-xl text-white font-bold text-sm transition flex items-center gap-2">
                    <span class="material-symbols-outlined">directions</span>
                </button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/5 bg-black/20 backdrop-blur-md py-8 mt-16">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <a href="index.html" class="text-xl font-black tracking-tight mb-2 block hover:text-blue-300 transition">AZ LEARNER</a>
            <p class="text-sm text-gray-600">&copy; 2026 Francis Pwavwe Production.</p>
        </div>
    </footer>

    <script>
        window.showToast = (msg, type = 'success') => {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `${type === 'success' ? 'bg-green-600' : 'bg-red-600'} text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 border-2 border-white/20 min-w-[250px] toast-enter`;
            t.innerHTML = `<span class="material-symbols-outlined">${type === 'success' ? 'check_circle' : 'error'}</span><span class="font-bold text-sm">${msg}</span>`;
            c.appendChild(t);
            requestAnimationFrame(() => { t.classList.remove('toast-enter'); t.classList.add('toast-enter-active'); });
            setTimeout(() => { t.classList.add('toast-exit-active'); setTimeout(() => t.remove(), 300); }, 3000);
        };

        // GPS
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                p => { document.getElementById('gps-status').textContent = `GPS Locked: ${p.coords.latitude.toFixed(4)}, ${p.coords.longitude.toFixed(4)}`; },
                () => { document.getElementById('gps-status').textContent = 'GPS Signal Lost — using campus center'; }
            );
        } else {
            document.getElementById('gps-status').textContent = 'Geolocation not supported';
        }

        window.startNavigation = (dest) => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => {
                    const url = `https://www.google.com/maps/dir/?api=1&origin=${p.coords.latitude},${p.coords.longitude}&destination=${encodeURIComponent(dest)}&travelmode=walking`;
                    window.open(url, '_blank');
                }, () => {
                    const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(dest)}`;
                    window.open(url, '_blank');
                });
            } else {
                window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(dest)}`, '_blank');
            }
        };

        window.navigateCustom = () => {
            const dest = document.getElementById('custom-dest').value.trim();
            if (!dest) { showToast("Enter a destination", "error"); return; }
            startNavigation(dest + ' UCC Ghana');
        };
    </script>
</body>
</html>
