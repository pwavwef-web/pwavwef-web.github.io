<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZ Learner | Campus Events</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: white; min-height: 100vh; }
        .bg-animated { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(-45deg, #020617, #0f172a, #1e3a8a, #172554); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        @keyframes gradientBG { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        .glass-panel { background: rgba(255,255,255,0.03); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .toast-enter { opacity:0; transform:translateX(100%); }
        .toast-enter-active { opacity:1; transform:translateX(0); transition:all .3s ease; }
        .toast-exit-active { opacity:0; transform:translateX(100%); transition:all .3s ease; }
    </style>
</head>
<body>
    <div class="bg-animated"></div>
    <div id="toast-container" class="fixed top-20 right-6 z-[300] flex flex-col gap-2 pointer-events-none"></div>

    <!-- Header -->
    <header class="glass-panel border-b border-white/5 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="index.html" class="text-xl font-black tracking-tight text-white hover:text-blue-300 transition">AZ LEARNER</a>
            <nav class="hidden md:flex items-center gap-6 text-sm font-semibold text-gray-400">
                <a href="events.html" class="text-white transition">Events</a>
                <a href="gpa.html" class="hover:text-white transition">GPA Calc</a>
                <a href="leaderboard.html" class="hover:text-white transition">Arena</a>
                <a href="blog.html" class="hover:text-white transition">Blog</a>
                <a href="past-questions.html" class="hover:text-white transition">Past Qs</a>
                <a href="print.html" class="hover:text-white transition">Print</a>
                <a href="map.html" class="hover:text-white transition">Map</a>
            </nav>
            <div class="flex items-center gap-3">
                <a href="notifications.html" class="p-2 rounded-full hover:bg-white/10 transition text-gray-300 hover:text-white">
                    <span class="material-symbols-outlined text-xl">notifications</span>
                </a>
                <button id="loginBtn" onclick="toggleLogin()"
                    class="px-4 py-2 bg-blue-600/20 border border-blue-500/50 text-blue-300 rounded-full font-bold text-sm transition hover:bg-blue-600 hover:text-white flex items-center gap-2">
                    <span class="material-symbols-outlined text-[18px]">login</span> Login
                </button>
                <button onclick="document.getElementById('mobileMenu').classList.toggle('hidden')" class="md:hidden p-2 rounded-lg hover:bg-white/10 transition">
                    <span class="material-symbols-outlined">menu</span>
                </button>
            </div>
        </div>
        <div id="mobileMenu" class="hidden md:hidden border-t border-white/5 px-6 py-4 grid grid-cols-3 gap-3 text-center text-xs font-semibold text-gray-400">
            <a href="events.html" class="py-2 text-white">Events</a>
            <a href="gpa.html" class="py-2 hover:text-white transition">GPA Calc</a>
            <a href="leaderboard.html" class="py-2 hover:text-white transition">Arena</a>
            <a href="blog.html" class="py-2 hover:text-white transition">Blog</a>
            <a href="past-questions.html" class="py-2 hover:text-white transition">Past Qs</a>
            <a href="print.html" class="py-2 hover:text-white transition">Print</a>
            <a href="map.html" class="col-span-3 py-2 hover:text-white transition">Map</a>
        </div>
    </header>

    <!-- Login Modal -->
    <div id="loginModal" class="fixed inset-0 z-[200] flex items-center justify-center hidden">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="toggleLogin()"></div>
        <div class="relative glass-panel p-8 rounded-3xl w-full max-w-md border border-white/10 shadow-[0_0_50px_rgba(59,130,246,0.2)] transform scale-95 opacity-0 transition-all duration-300" id="loginContent">
            <button onclick="toggleLogin()" class="absolute top-4 right-4 text-gray-400 hover:text-white"><span class="material-symbols-outlined">close</span></button>
            <div class="text-center mb-8"><div class="text-4xl mb-3">⚡</div><h2 class="text-2xl font-black">Join the Squad</h2><p class="text-gray-400 text-sm mt-2">Your university companion awaits.</p></div>
            <div class="space-y-4">
                <input type="email" id="emailInput" placeholder="Your university email" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition">
                <input type="password" id="passwordInput" placeholder="••••••••" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition" onkeydown="if(event.key==='Enter') handleEmailLogin()">
                <button id="authSubmitBtn" onclick="handleEmailLogin()" class="w-full bg-gradient-to-r from-blue-600 to-cyan-600 py-3 rounded-xl font-bold hover:shadow-[0_0_20px_rgba(59,130,246,0.5)] transition flex justify-center items-center gap-2">
                    <span class="material-symbols-outlined text-[18px]">login</span> Sign In
                </button>
            </div>
        </div>
    </div>

    <!-- Page Content -->
    <main class="max-w-3xl mx-auto px-6 py-12">
        <div class="text-center mb-10">
            <div class="w-16 h-16 bg-purple-500/20 rounded-2xl mx-auto flex items-center justify-center mb-4 border border-purple-500/30">
                <span class="material-symbols-outlined text-3xl text-purple-400">event</span>
            </div>
            <h1 class="text-3xl font-black text-white mb-2">Campus Events 🎟️</h1>
            <p class="text-gray-400">What's poppin' at UCC.</p>
        </div>

        <!-- Events List -->
        <div id="events-list" class="space-y-6">
            <div class="animate-pulse flex flex-col gap-4">
                <div class="h-48 bg-white/5 rounded-2xl"></div>
                <div class="h-48 bg-white/5 rounded-2xl"></div>
                <div class="h-48 bg-white/5 rounded-2xl"></div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/5 bg-black/20 backdrop-blur-md py-8 mt-16">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <a href="index.html" class="text-xl font-black tracking-tight mb-2 block hover:text-blue-300 transition">AZ LEARNER</a>
            <p class="text-sm text-gray-600">&copy; 2026 Francis Pwavwe Production.</p>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, collection, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

        const firebaseConfig = { apiKey:"AIzaSyCKpJ7YzuHMTaTC3jXFWiEPmuwdTU4h96Y", authDomain:"az-learner.firebaseapp.com", projectId:"az-learner", storageBucket:"az-learner.firebasestorage.app", messagingSenderId:"12958795950", appId:"1:12958795950:web:326411293864571040453f" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            const btn = document.getElementById('loginBtn');
            if (user && btn) {
                const name = user.displayName || user.email.split('@')[0];
                btn.innerHTML = `<span class="material-symbols-outlined text-[18px]">verified</span> ${name.split(' ')[0]}`;
                btn.className = "px-4 py-2 bg-green-500/20 border border-green-500/50 text-green-300 rounded-full font-bold text-sm transition flex items-center gap-2";
                btn.onclick = () => { if(confirm('Sign out?')) import("https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js").then(({getAuth,signOut})=>signOut(getAuth())); };
            }
        });

        window.handleEmailLogin = async () => {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const btn = document.getElementById('authSubmitBtn');
            if (!email || !password) { showToast("Enter email & password", "error"); return; }
            const orig = btn.innerHTML;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin text-sm">progress_activity</span> Verifying...`;
            try {
                const { signInWithEmailAndPassword } = await import("https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js");
                await signInWithEmailAndPassword(auth, email, password);
                showToast("Welcome back! ⚡"); window.toggleLogin(); btn.innerHTML = orig;
            } catch(e) { showToast("Login failed: " + e.message, "error"); btn.innerHTML = orig; }
        };

        // Load events
        async function loadEvents() {
            const list = document.getElementById('events-list');
            try {
                const q = query(collection(db, "events"), orderBy("timestamp", "desc"), limit(20));
                const snap = await getDocs(q);
                list.innerHTML = '';
                if (snap.empty) {
                    list.innerHTML = `<div class="text-center py-20 opacity-60"><span class="material-symbols-outlined text-6xl mb-4">event_busy</span><p class="text-lg">No upcoming events.</p><p class="text-sm text-gray-500 mt-2">Dry spell? 🏜️ Check back soon.</p></div>`;
                    return;
                }
                snap.forEach(doc => {
                    const ev = doc.data();
                    list.innerHTML += `
                        <div class="glass-panel rounded-2xl overflow-hidden border border-white/10 group hover:border-purple-500/30 transition">
                            <div class="h-48 bg-black/50 relative overflow-hidden">
                                <img src="${ev.image || 'https://via.placeholder.com/800x400/1e3a8a/ffffff?text=Campus+Event'}"
                                    class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition group-hover:scale-105"
                                    alt="${ev.title}" loading="lazy">
                                <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                                <div class="absolute bottom-3 right-3 bg-black/80 backdrop-blur-sm text-white text-xs font-bold px-3 py-1.5 rounded-full">${ev.date || ''}</div>
                            </div>
                            <div class="p-6">
                                <h2 class="font-black text-xl text-white mb-2 leading-tight">${ev.title}</h2>
                                <div class="flex items-center gap-3 text-xs text-gray-400 mb-3">
                                    <span class="flex items-center gap-1"><span class="material-symbols-outlined text-sm">location_on</span> ${ev.venue || 'TBA'}</span>
                                    <span>•</span>
                                    <span class="flex items-center gap-1"><span class="material-symbols-outlined text-sm">schedule</span> ${ev.time || 'TBA'}</span>
                                </div>
                                <p class="text-sm text-gray-300 leading-relaxed">${ev.description || ''}</p>
                            </div>
                        </div>`;
                });
            } catch(e) {
                list.innerHTML = `<div class="text-center py-20 text-red-400"><span class="material-symbols-outlined text-4xl mb-2">error</span><p>Failed to load events.</p></div>`;
            }
        }

        loadEvents();
    </script>
    <script>
        window.showToast = (msg, type = 'success') => {
            const c = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `${type === 'success' ? 'bg-green-600' : 'bg-red-600'} text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 border-2 border-white/20 min-w-[250px] toast-enter`;
            t.innerHTML = `<span class="material-symbols-outlined">${type === 'success' ? 'check_circle' : 'error'}</span><span class="font-bold text-sm">${msg}</span>`;
            c.appendChild(t);
            requestAnimationFrame(() => { t.classList.remove('toast-enter'); t.classList.add('toast-enter-active'); });
            setTimeout(() => { t.classList.add('toast-exit-active'); setTimeout(() => t.remove(), 300); }, 3000);
        };
        window.toggleLogin = () => {
            const modal = document.getElementById('loginModal');
            const content = document.getElementById('loginContent');
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                setTimeout(() => { content.classList.remove('scale-95','opacity-0'); content.classList.add('scale-100','opacity-100'); }, 10);
            } else {
                content.classList.remove('scale-100','opacity-100');
                content.classList.add('scale-95','opacity-0');
                setTimeout(() => modal.classList.add('hidden'), 300);
            }
        };
    </script>
</body>
</html>
