<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AZ Learner | Team Disbursement Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom animations for that premium feel */
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .animate-spin-slow { animation: spin 2s linear infinite; }
    .fade-in { animation: fadeIn 0.5s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="min-h-screen bg-slate-950 flex flex-col items-center justify-center p-4 font-sans text-slate-200">

  <div class="w-full max-w-md bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl overflow-hidden relative">
    
    <!-- Header -->
    <div class="bg-gradient-to-r from-blue-600 to-indigo-600 p-6 text-center">
      <div class="mx-auto bg-white/20 w-16 h-16 rounded-full flex items-center justify-center backdrop-blur-md mb-4 shadow-inner">
        <!-- Wallet SVG -->
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-9H5a2 2 0 0 1-2-2Z"/></svg>
      </div>
      <h1 class="text-2xl font-bold text-white tracking-tight">AZ Learner</h1>
      <p class="text-blue-100 text-sm font-medium mt-1">Team Disbursement Portal</p>
    </div>

    <!-- Main Content Area -->
    <div class="p-8 relative">
      
      <!-- Error Banner (Hidden by default) -->
      <div id="error-banner" class="hidden mb-5 bg-red-500/10 border border-red-500/20 rounded-lg p-3 flex items-start gap-3 fade-in">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-red-400 shrink-0 mt-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <p id="error-message" class="text-sm text-red-400"></p>
      </div>

      <!-- Payment Form -->
      <form id="payment-form" class="space-y-5">
        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Full Name</label>
          <input type="text" id="name" placeholder="Kwame Mensah" class="w-full bg-slate-950 border border-slate-800 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 rounded-lg px-4 py-3 text-slate-100 placeholder-slate-600 outline-none transition-all" required />
        </div>

        <div>
          <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Role in AZ Learner</label>
          <input type="text" id="role" placeholder="e.g. Content Strategist" class="w-full bg-slate-950 border border-slate-800 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 rounded-lg px-4 py-3 text-slate-100 placeholder-slate-600 outline-none transition-all" required />
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Network</label>
            <select id="network" class="w-full bg-slate-950 border border-slate-800 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 rounded-lg px-4 py-3 text-slate-100 outline-none transition-all appearance-none">
              <option value="MTN">MTN MoMo</option>
              <option value="Telecel">Telecel Cash</option>
              <option value="AirtelTigo">AT Money</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Phone Number</label>
            <input type="tel" id="phone" placeholder="055 123 4567" class="w-full bg-slate-950 border border-slate-800 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 rounded-lg px-4 py-3 text-slate-100 placeholder-slate-600 outline-none transition-all" required />
          </div>
        </div>

        <button type="submit" id="submit-btn" class="w-full mt-4 bg-blue-600 hover:bg-blue-500 text-white font-medium rounded-lg px-4 py-3.5 flex items-center justify-center gap-2 transition-all shadow-lg shadow-blue-500/20 disabled:opacity-70 disabled:cursor-not-allowed">
          <span id="submit-text" class="flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Submit Details
          </span>
          <span id="loading-text" class="hidden flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 animate-spin-slow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>
            Processing...
          </span>
        </button>
      </form>

      <!-- Success View (Hidden by default) -->
      <div id="success-view" class="hidden flex-col items-center text-center py-8 fade-in">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-16 h-16 text-emerald-500 mb-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <h2 class="text-xl font-bold text-slate-100">Details Received</h2>
        <p class="text-slate-400 mt-2 text-sm">Your payment configuration has been securely logged with administration.</p>
        <button id="reset-btn" class="mt-6 px-6 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-full text-sm transition-colors">
          Submit Another
        </button>
      </div>

    </div>
  </div>
  
  <p class="mt-8 text-xs text-slate-600 font-medium tracking-wide uppercase">
    AZ Learner Internal Systems © <span id="year"></span>
  </p>

  <!-- FIREBASE LOGIC -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

    // ============================================================================
    // 🛑 FRANCIS: PASTE YOUR FIREBASE CONFIG OBJECT HERE 🛑
    // ============================================================================
    const firebaseConfig = {
      apiKey: "AIzaSyCKpJ7YzuHMTaTC3jXFWiEPmuwdTU4h96Y",
            authDomain: "az-learner.firebaseapp.com",
            projectId: "az-learner",
            storageBucket: "az-learner.firebasestorage.app",
            messagingSenderId: "12958795950",
            appId: "1:12958795950:web:326411293864571040453f"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const AZ_APP_ID = 'az-learner-core'; // Your custom identifier

    let currentUser = null;

    // DOM Elements
    const form = document.getElementById('payment-form');
    const submitBtn = document.getElementById('submit-btn');
    const submitText = document.getElementById('submit-text');
    const loadingText = document.getElementById('loading-text');
    const successView = document.getElementById('success-view');
    const errorBanner = document.getElementById('error-banner');
    const errorMessage = document.getElementById('error-message');
    const resetBtn = document.getElementById('reset-btn');
    document.getElementById('year').textContent = new Date().getFullYear();

    // Authenticate user anonymously to allow writing to DB
    signInAnonymously(auth).catch((error) => {
      showError("Authentication failed. System offline.");
      console.error(error);
    });

    onAuthStateChanged(auth, (user) => {
      currentUser = user;
    });

    function showError(msg) {
      errorMessage.textContent = msg;
      errorBanner.classList.remove('hidden');
      setTimeout(() => errorBanner.classList.add('hidden'), 5000);
    }

    function setLoading(isLoading) {
      submitBtn.disabled = isLoading;
      if (isLoading) {
        submitText.classList.add('hidden');
        loadingText.classList.remove('hidden');
        loadingText.classList.add('flex');
      } else {
        submitText.classList.remove('hidden');
        loadingText.classList.add('hidden');
        loadingText.classList.remove('flex');
      }
    }

    // Handle Form Submission
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      if (!currentUser) {
        showError("Network anomaly: Not authenticated yet. Please wait a second.");
        return;
      }

      const name = document.getElementById('name').value.trim();
      const role = document.getElementById('role').value.trim();
      const network = document.getElementById('network').value;
      const phone = document.getElementById('phone').value.trim();

      if (!name || !role || !phone) {
        showError("All fields are mandatory, no cap.");
        return;
      }

      setLoading(true);

      try {
        const paymentsRef = collection(db, 'artifacts', AZ_APP_ID, 'public', 'data', 'az_team_payments');
        await addDoc(paymentsRef, {
          name,
          role,
          network,
          phone,
          submitterUid: currentUser.uid,
          timestamp: serverTimestamp(),
        });

        // Show Success View
        form.classList.add('hidden');
        successView.classList.remove('hidden');
        successView.classList.add('flex');
        form.reset();

      } catch (error) {
        console.error("Firestore Error:", error);
        showError("Failed to transmit data. Check your connection.");
      } finally {
        setLoading(false);
      }
    });

    // Reset UI to submit another
    resetBtn.addEventListener('click', () => {
      successView.classList.add('hidden');
      successView.classList.remove('flex');
      form.classList.remove('hidden');
    });

  </script>
</body>
</html>
